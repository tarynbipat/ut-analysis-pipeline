project_id: ut-2026-embr-hobbyist
project_name: "Embr Usability Test - Hobbyist"
description: "Testing Embr deployment experience for hobbyist users deploying web apps via Vercel"

participants:
  - id: P001
    name: "Participant 1"
    demographics:
      tech_proficiency: high
      git_understanding: yes
      deployment_platform: vercel
      user_type: hobbyist
  - id: P002
    name: "Participant 2"
    demographics:
      tech_proficiency: high

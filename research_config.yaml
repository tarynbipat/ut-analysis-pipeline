tasks:
  - id: TASK-001
    name: "Deploy a template"
    description: "Deploy a template application using Embr"
    success_criteria: "Template successfully deployed and accessible"
    time_limit_seconds: 600

  - id: TASK-002
    name: "Explore portal experience"
    description: "Explore the Embr portal and answer questions about the experience"
    success_criteria: "Participant navigates portal and provides feedback"
    time_limit_seconds: 600

  - id: TASK-003
    name: "Deploy using alternate method"
    description: "Make a change to the app and redeploy using an alternate method (Embr CLI, GitHub Copilot, or VSCode extension)"
    success_criteria: "App change deployed successfully via alternate method"
    time_limit_seconds: 900

  - id: TASK-004
    name: "Deploy using another method (optional)"
    description: "Make a change and try deploying using a different method than Task 3"
    success_criteria: "App change deployed successfully via a second alternate method"
    time_limit_seconds: 900

heuristic_framework: "nielsen_10"

custom_heuristics:
  - "Visibility of system status"
  - "Match between system and real world"
  - "User control and freedom"
  - "Error prevention and recovery"
  - "Flexibility and efficiency"
  - "Aesthetic and minimalist design"
  - "Help and documentation"
  - "Trust and credibility"
  - "Developer experience"
  - "Onboarding clarity"

research_date: 2026-06-01

metadata:
  researcher: "Taryn Bipat"
  platform: "Web/CLI/VSCode"
  context: "Hobbyist developers using Vercel for deployment"
